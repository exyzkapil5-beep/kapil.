        header {

        }
.profile-pic{
    width: 320px;

        main {
            display: flex;
            flex-wrap: wrap;
        }

        .cardstyle {
            width: 60%;
            height: 180px;
            box-shadow: 10px 10px 10px black;
        }

        .pic {
            width: 100%;
        }

        /* Navigation Styles */
        nav {
            width: 90%;
            margin: 50px auto;
            text-align: center;
        }

        nav ol li {
            list-style: none;
            background: teal;
            margin-left: -2px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 10px 10px 10px black;
            transition: 0.50s;
        }

        nav ol li:hover {
            background: white;
            transform: scale(1.10);
        }

        /* Footer & Social Media Styling (From Images) */
        footer {
            background: rgb(173, 0, 0);
            display: flex;
            flex-direction: column;
            text-align: center;
            margin-top: 200px;
            clear: both;
        }

        footer #info, #sitemap, #socialmedia {
            width: 100%;
            padding: 10px;
        }

        #sitemap ul li, #socialmedia ul li {
            list-style: none;
            text-align: left;
            margin-left: 40%;
        }

        /* Link Styling */
        a:link { color: yellow; text-decoration: none; }
        a:visited { color: yellow; }
        a:hover { text-decoration: underline; color: rgb(0, 255, 217); }
        a:active { color: rgb(255, 166, 0); }

        /* Media Queries */
        @media only screen and (max-width: 600px) {
            body { background: green; }
            #col2 { display: none; }
            header { justify-content: center; }
            .cardstyle { margin: 40px auto auto auto; }
            nav ol li { display: block; }
        }

        @media only screen and (min-width: 600px) {
            body { background: yellow; }
            #col2 { width: 70%; }
            #col1 { width: 100px; height: 40px; }
            main { justify-content: center; }
            .cardstyle { width: 40%; margin: 10px; }
            nav ol li { display: inline; }
        }

        @media only screen and (min-width: 768px) {
            body { background: rgb(208, 105, 123); }
            #col1 { width: 15%; height: 120px; }
            #col2 { height: 200px; }
            .cardstyle { width: 20%; margin: 10px; }
        }

        @media only screen and (min-width: 992px) {
            body { background: rgb(173, 42, 42); }
            #col2 { width: 90%; height: 400px; margin: auto; }
            #col1 { display: none; }
        }
    </style>
</head>
