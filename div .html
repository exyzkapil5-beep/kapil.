<!doctype html>

<html>
<head>
<title>list in html </title>
<header>
List in html
</header>
<style>
header
{
text-align:center;
box-sizing:border-box;
background:black;
padding:30px;
color:white;
font-size:50px;
box-shadow:10px 10px 10px gray;
margin-top:10px;
height:100px;

}
</head>


</style>

<body>
<main>
<h1>
<!-- order list -->
<ol>
<li>india</li>
<li>usa</li>
<li>uk</li>
<li>China</li>
<li>Nepal</li>

</ol>

<!-- unorder list -->
<ul>
<li>india</li>
<li>usa</li>
<li>uk</li>
<li>China</li>
<li>Nepal</li>

</ul>

<!-- variation in list -->
 
<ol type="A">
<li>India</li>
<li>Use</li>
<li>UK</li>
<li>China</li>
<li>Nepal</li>

</ol>
